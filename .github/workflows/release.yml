name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dist/index.html
        run: |
          python3 make_readme_js.py
          python3 bundler.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/index.html
          generate_release_notes: true
          name: Arbonotate ${{ github.ref_name }}
          body: |
            ## Download

            **[index.html](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/index.html)** — single self-contained file, open directly in your browser. No server needed.

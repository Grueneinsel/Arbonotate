name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build dist/index.html
        run: python bundler.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Arbonotate ${{ github.ref_name }}"
          body: |
            ## Arbonotate ${{ github.ref_name }}

            **Standalone HTML file** — no installation, no server, no internet connection required.

            ### Download & use
            1. Download **`index.html`** below
            2. Open it in any modern browser
            3. Done — all features work offline

            See [README](https://github.com/Grueneinsel/Arbonotate/blob/main/README.md) for a full feature overview.
          files: dist/index.html
          draft: false
          prerelease: false

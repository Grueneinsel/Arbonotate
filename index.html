<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CoNLL-U Vergleich (v1)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="bar">
    <h1>CoNLL-U Vergleich (v1)</h1>
    <p class="muted">
      Dateien nachladen/löschen/resetten. Vergleich satzweise. Goldstandard pro Zeile wählbar.
      Wenn Custom befüllt ist → Custom ist Gold.
    </p>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>1) Dateien</h2>

      <input id="fileInput" type="file" accept=".conllu,.conll,.txt" multiple hidden />

      <div class="row">
        <button id="addBtn">Dateien hinzufügen</button>
        <button id="resetBtn" class="danger">Reset</button>
        <span id="fileMeta" class="muted"></span>
      </div>

      <div id="fileList" class="fileList" style="margin-top:10px"></div>
    </section>

    <section class="card">
      <h2>2) Satz wählen</h2>
      <div class="row">
        <button id="prevBtn" disabled>←</button>
        <select id="sentSelect" disabled></select>
        <button id="nextBtn" disabled>→</button>
        <span id="sentMeta" class="muted"></span>
      </div>
      <div id="sentText" class="sentText"></div>
    </section>

    <section class="card">
      <h2>3) Vergleich</h2>

      <div class="row" style="margin-bottom:10px">
        <button id="customInitBtn" disabled>Custom aus Datei 1</button>
        <button id="customClearBtn" class="danger" disabled>Custom Satz löschen</button>
        <span class="muted small">
          Gold pro Zeile: Dropdown „Gold-Quelle“. Bei Custom-Eingabe → Gold=Custom.
        </span>
      </div>

      <div class="tableWrap">
        <table id="cmpTable"></table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
